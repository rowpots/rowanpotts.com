<body id="top">
  <div class="page">
    <header class="topbar">
      <a class="brand" href="/">Rowan Potts Photography</a>
      <input class="nav_toggle" type="checkbox" id="featured_works_nav_toggle" />
      <label class="menu_tab" for="featured_works_nav_toggle" aria-label="Toggle navigation menu">

        <span class="menu_icon" aria-hidden="true"><span></span><span></span><span></span></span>

      <nav class="links_list" aria-label="Primary navigation">

        <a href="/contact">Contact</a>
        <a href="https://www.instagram.com/pottsey.photos/" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>
    </header>

    <main>
      <section class="gallery_header" aria-labelledby="featured_works_title">
        <h1 id="featured_works_title">Featured Works</h1>
      </section>

      <section class="photo_container" aria-label="Featured photography">
        <div class="gallery_top_grid">
          <img class="image" src="/bestcomp/football reedit-5.jpg" alt="Football featured photograph" loading="eager" />
          <img class="image" src="/bestcomp/Elizabeth-Fowler-Graduation (26 of 80) (1).jpg" alt="Graduation portrait featured photograph" loading="eager" />
        </div>
        <div class="gallery_masonry">
          <img class="image" src="/bestcomp/basketball reedit-1.jpg" alt="Basketball featured photograph" loading="lazy" />
          <img class="image" src="/bestcomp/baseball reedit-2.jpg" alt="Baseball featured photograph" loading="lazy" />
          <img class="image" src="/bestcomp/softball reedit-1.jpg" alt="Softball featured photograph" loading="lazy" />
          <img class="image" src="/bestcomp/myfarm-3.jpg" alt="Landscape featured photograph" loading="lazy" />
          <img class="image" src="/bestcomp/troy reedit-1.jpg" alt="Football sideline featured photograph" loading="lazy" />
          <img class="image" src="/bestcomp/troy reedit-2.jpg" alt="Football action featured photograph" loading="lazy" />
          <img class="image" src="/bestcomp/troy reedit-3.jpg" alt="Football celebration featured photograph" loading="lazy" />
          <img class="image" src="/bestcomp/Elizabeth-Fowler-Graduation (8 of 80) (1).jpg" alt="Graduation featured photograph" loading="lazy" />
        </div>
      </section>
    </main>

    <footer class="footer">

      </nav>
    </footer>
